<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Handy Utils • Meta Ray-Ban</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0f0;
            font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            height: 100%;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            display: flex;
            flex-direction: column;
            padding: 12px;
        }
        
        h1 {
            font-size: 22px;
            margin: 8px 0;
            text-align: center;
        }
        
        h2 {
            font-size: 18px;
            margin: 10px 0;
        }
        
        h3 {
            font-size: 14px;
            margin: 8px 0;
        }
        
        /* Screen container */
        .screen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        
        .screen.active {
            display: flex;
        }
        
        /* Menu styling */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            justify-content: flex-start;
        }
        
        /* Buttons */
        button, .button {
            background: #111;
            color: #0f0;
            border: 2px solid #333;
            padding: 14px 16px;
            margin: 6px 0;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }
        
        button:active, .button:active {
            border-color: #0f0;
            background: #222;
            box-shadow: 0 0 12px #0f0;
        }
        
        /* Inputs */
        input[type="text"],
        input[type="date"],
        textarea,
        select {
            background: #111;
            color: #0f0;
            border: 1px solid #333;
            padding: 12px;
            margin: 6px 0;
            font-size: 16px;
            border-radius: 4px;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
            min-height: 44px;
        }
        
        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            border-color: #0f0;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            background: #1a1a1a;
        }
        
        /* Cards */
        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
        }
        
        .card.active {
            border-color: #0f0;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.2);
        }
        
        .card-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        
        /* Grid layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        
        .grid-item {
            background: #0a0a0a;
            border-left: 3px solid #0f0;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .grid-item-label {
            font-size: 12px;
            color: #0a0;
            margin-bottom: 4px;
        }
        
        .grid-item-value {
            font-size: 18px;
            font-weight: bold;
            color: #0f0;
        }
        
        /* Lists */
        ul, ol {
            list-style: none;
            padding: 0;
            margin: 8px 0;
        }
        
        .list-item {
            background: #111;
            border-left: 3px solid #0f0;
            padding: 12px;
            margin: 6px 0;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .list-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .list-item.high { border-left-color: #f00; }
        .list-item.medium { border-left-color: #ff0; }
        .list-item.low { border-left-color: #0f0; }
        
        .list-item-content {
            flex: 1;
        }
        
        .list-item-actions {
            display: flex;
            gap: 6px;
            margin-left: 10px;
        }
        
        .action-btn {
            background: #222;
            color: #0f0;
            border: 1px solid #333;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            min-height: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .action-btn:active { background: #333; }
        
        /* Status indicators */
        .status {
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        
        .status.loading {
            background: #1a1a1a;
            color: #0a0;
            border: 1px solid #0a0;
        }
        
        .status.success {
            background: #0a1a0a;
            color: #0f0;
            border: 2px solid #0f0;
        }
        
        .status.error {
            background: #1a0a0a;
            color: #f00;
            border: 2px solid #f00;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .modal-header h2 { margin: 0; }
        
        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #f00;
            padding: 4px 8px;
        }
        
        .modal-footer {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #333;
            margin-top: auto;
        }
        
        .modal-footer button {
            flex: 1;
            margin: 0;
        }
        
        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin: 8px 0;
        }
        
        .control-btn {
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .control-btn.active {
            border-color: #0f0;
            background: #222;
        }
        
        /* Responsive utilities */
        .flex-row {
            display: flex;
            gap: 8px;
        }
        
        .flex-col {
            display: flex;
            flex-direction: column;
        }
        
        .spacer { flex: 1; }
        
        /* Text utilities */
        .text-sm { font-size: 12px; }
        .text-md { font-size: 14px; }
        .text-lg { font-size: 16px; }
        .text-xl { font-size: 20px; }
        
        .text-muted { color: #0a0; }
        .text-center { text-align: center; }
        
        .m-0 { margin: 0; }
        .m-xs { margin: 4px; }
        .m-sm { margin: 8px; }
        .m-md { margin: 12px; }
        
        /* Large heading display */
        .heading-large {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 12px 0;
            color: #0f0;
        }
        
        .location-mono {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
            background: #0a0a0a;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #0f0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>👓 Handy Utils</h1>
    
    <div class="screen-container">
        <!-- Home Screen -->
        <div id="home" class="screen active menu">
            <button onclick="showScreen('weather')">🌤️ Weather</button>
            <button onclick="showScreen('navigation')">🧭 Navigation & GPS</button>
            <button onclick="showScreen('todo')">✅ Todo List</button>
        </div>

        <!-- Weather Screen -->
        <div id="weather" class="screen">
            <h2>Weather</h2>
            
            <div class="flex-row">
                <input type="text" id="weather-location" placeholder="City..." value="NYC" style="flex: 1;">
                <button onclick="getWeather()" style="width: auto; padding: 12px 16px;">Search</button>
            </div>

            <div id="weather-current"></div>
            <div id="weather-forecast"></div>
            <div id="weather-saved"></div>

            <button onclick="showScreen('home')" style="margin-top: auto;">← Back</button>
        </div>

        <!-- Navigation Screen -->
        <div id="navigation" class="screen">
            <h2>Navigation & GPS</h2>
            
            <div id="gps-status" class="status loading">⏳ Initializing...</div>

            <div id="location-info"></div>

            <div id="heading-display" class="heading-large">--°</div>

            <div id="nav-quick-stats" class="grid-2"></div>

            <!-- Waypoint Section -->
            <div class="card">
                <div class="card-header">Add Waypoint</div>
                <input type="text" id="waypoint-name" placeholder="Name" style="margin: 0;">
                <button onclick="addCurrentLocationAsWaypoint()" style="margin: 6px 0;">📍 Save Location</button>
                <div class="flex-row" style="margin: 6px 0;">
                    <input type="text" id="waypoint-lat" placeholder="Lat" style="flex: 1; margin: 0;">
                    <input type="text" id="waypoint-lon" placeholder="Lon" style="flex: 1; margin: 0; margin-left: 6px;">
                </div>
                <button onclick="addCustomWaypoint()" style="margin: 0;">Add Custom</button>
            </div>

            <!-- Waypoints List -->
            <div>
                <h3>Waypoints</h3>
                <ul id="waypoints-list"></ul>
            </div>

            <!-- Route Tracking -->
            <div class="card">
                <button onclick="toggleRouteTracking()" id="tracking-btn" style="margin: 0;">🔴 Start Tracking</button>
                <button onclick="clearRouteHistory()" style="margin: 6px 0 0 0; background: #1a0a0a;">Clear History</button>
                <div id="route-stats" class="text-sm text-muted" style="margin-top: 8px;"></div>
            </div>

            <button onclick="showScreen('home')" style="margin-top: auto;">← Back</button>
        </div>

        <!-- Todo Screen -->
        <div id="todo" class="screen">
            <h2>Tasks</h2>
            
            <!-- Quick Add -->
            <div class="card">
                <input type="text" id="todo-input" placeholder="Task title..." style="margin: 0 0 6px 0;">
                <textarea id="todo-desc" placeholder="Notes..." style="height: 36px; margin: 0 0 6px 0;"></textarea>
                <div class="grid-2" style="margin: 0 0 6px 0;">
                    <select id="todo-priority" style="margin: 0;">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <select id="todo-category" style="margin: 0;">
                        <option value="">Category</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="health">Health</option>
                        <option value="shopping">Shopping</option>
                    </select>
                </div>
                <input type="date" id="todo-date" style="margin: 0 0 6px 0;">
                <button onclick="addTodo()" style="margin: 0;">+ Add Task</button>
            </div>

            <!-- Filters -->
            <div class="controls">
                <button class="control-btn active" onclick="setFilter('all')">All</button>
                <button class="control-btn" onclick="setFilter('active')">Active</button>
                <button class="control-btn" onclick="setFilter('completed')">Done</button>
                <button class="control-btn" onclick="setFilter('high')">🔴 High</button>
            </div>

            <input type="text" id="search-input" placeholder="Search..." onkeyup="filterTodos()">

            <!-- Tasks List -->
            <ul id="todo-list"></ul>

            <button onclick="showScreen('home')" style="margin-top: auto;">← Back</button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin: 0;">Edit Task</h2>
                <span class="modal-close" onclick="closeEditModal()">✕</span>
            </div>
            
            <input type="text" id="edit-input" placeholder="Task title...">
            <textarea id="edit-desc" placeholder="Notes..." style="height: 40px;"></textarea>
            <div class="grid-2">
                <select id="edit-priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <select id="edit-category">
                    <option value="">Category</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                    <option value="health">Health</option>
                    <option value="shopping">Shopping</option>
                </select>
            </div>
            <input type="date" id="edit-date" style="margin-bottom: 12px;">

            <div class="modal-footer">
                <button onclick="saveEdit()" style="flex: 2; background: #0a2a0a; border-color: #0f0;">Save</button>
                <button onclick="closeEditModal()" style="flex: 1; background: #1a0a0a; border-color: #f00;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ========== SCREEN NAVIGATION ==========
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const screen = document.getElementById(id);
            if (screen) {
                screen.classList.add('active');
                if (id === 'weather') renderSavedLocations();
                if (id === 'navigation') {
                    initializeGPS();
                    renderWaypoints();
                }
            }
        }

        // ========== TOAST NOTIFICATIONS ==========
        function showNotification(message, type = 'info') {
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        // ========== WEATHER SYSTEM ==========
        let savedLocations = JSON.parse(localStorage.getItem('weather-locations') || '[]');

        function saveLocation(location) {
            if (!savedLocations.includes(location)) {
                savedLocations.push(location);
                localStorage.setItem('weather-locations', JSON.stringify(savedLocations));
                showNotification('Location saved', 'success');
            }
        }

        function renderSavedLocations() {
            const container = document.getElementById('weather-saved');
            if (savedLocations.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '<div style="margin: 8px 0;"><div class="text-sm text-muted">Saved:</div><div style="display: flex; gap: 6px; flex-wrap: wrap;">';
            savedLocations.forEach(loc => {
                html += `<button class="control-btn" onclick="setWeatherLocation('${loc}')" style="margin: 0; padding: 8px 10px; font-size: 13px;">📍 ${loc}</button>`;
            });
            html += '</div></div>';
            container.innerHTML = html;
        }

        function setWeatherLocation(location) {
            document.getElementById('weather-location').value = location;
            getWeather();
        }

        async function getWeather() {
            const location = document.getElementById('weather-location').value.trim() || 'NYC';
            const currentDiv = document.getElementById('weather-current');
            const forecastDiv = document.getElementById('weather-forecast');
            
            currentDiv.innerHTML = '<div class="status loading">Fetching...</div>';
            forecastDiv.innerHTML = '';

            try {
                const res = await fetch(`https://wttr.in/${location}?format=j1`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();
                
                const current = data.current_condition[0];
                const location_info = data.nearest_area[0];
                const areaName = location_info.areaName[0].value;
                
                let html = `
                    <div class="card active">
                        <div style="display: flex; justify-content: space-between; align-items: baseline;">
                            <div class="text-lg">📍 ${areaName}</div>
                            <div class="heading-large" style="margin: 0; font-size: 32px;">${current.temp_C}°C</div>
                        </div>
                        <div class="text-sm text-muted">${current.weatherDesc[0].value}</div>
                        <div class="grid-2" style="margin-top: 8px;">
                            <div class="grid-item">
                                <div class="grid-item-label">Feels</div>
                                <div class="grid-item-value">${current.FeelsLikeC}°</div>
                            </div>
                            <div class="grid-item">
                                <div class="grid-item-label">Humidity</div>
                                <div class="grid-item-value">${current.humidity}%</div>
                            </div>
                            <div class="grid-item">
                                <div class="grid-item-label">Wind</div>
                                <div class="grid-item-value">${current.windspeedKmph}</div>
                            </div>
                            <div class="grid-item">
                                <div class="grid-item-label">Visibility</div>
                                <div class="grid-item-value">${current.visibility}km</div>
                            </div>
                        </div>
                        <button onclick="saveLocation('${areaName}')" style="margin-top: 8px; width: 100%;">⭐ Save</button>
                    </div>
                `;
                currentDiv.innerHTML = html;

                const forecast = data.weather.slice(0, 3);
                let forecastHtml = '<div class="card"><div class="card-header">3-Day Forecast</div><div style="display: flex; gap: 6px; overflow-x: auto;">';
                
                forecast.forEach(day => {
                    const date = new Date(day.date);
                    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                    
                    forecastHtml += `
                        <div style="flex-shrink: 0; background: #0a0a0a; padding: 8px; border-radius: 4px; text-align: center; font-size: 12px; border-left: 3px solid #0f0;">
                            <div style="font-weight: bold; margin-bottom: 4px;">${dayName}</div>
                            <div>${day.maxtempC}°/${day.mintempC}°</div>
                            <div style="font-size: 10px; color: #0a0; margin-top: 2px;">💧 ${day.hourly[0]?.chanceofrain || 0}%</div>
                        </div>
                    `;
                });
                
                forecastHtml += '</div></div>';
                forecastDiv.innerHTML = forecastHtml;

            } catch (e) {
                currentDiv.innerHTML = `<div class="status error">❌ Error: ${e.message}</div>`;
            }
        }

        // ========== NAVIGATION & GPS SYSTEM ==========
        let currentLocation = null;
        let currentHeading = 0;
        let gpsWatchId = null;
        let routeTracking = false;
        let routeHistory = JSON.parse(localStorage.getItem('route-history') || '[]');
        let waypoints = JSON.parse(localStorage.getItem('waypoints') || '[]');

        function initializeGPS() {
            const statusDiv = document.getElementById('gps-status');
            
            if (!navigator.geolocation) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Geolocation not supported';
                return;
            }

            statusDiv.className = 'status loading';
            statusDiv.textContent = '⏳ Requesting location...';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLocation = position.coords;
                    updateLocationDisplay();
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✓ GPS Connected';
                    
                    if (!gpsWatchId) {
                        gpsWatchId = navigator.geolocation.watchPosition(
                            (position) => {
                                currentLocation = position.coords;
                                updateLocationDisplay();
                            },
                            () => {},
                            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                        );
                    }
                },
                (error) => {
                    let msg = '❌ GPS Error';
                    if (error.code === error.PERMISSION_DENIED) msg += ': Permission denied';
                    if (error.code === error.POSITION_UNAVAILABLE) msg += ': Unavailable';
                    statusDiv.className = 'status error';
                    statusDiv.textContent = msg;
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );

            window.addEventListener('deviceorientation', handleDeviceOrientation);
        }

        function handleDeviceOrientation(event) {
            currentHeading = Math.round(event.alpha) || 0;
            updateHeadingDisplay();
        }

        function updateLocationDisplay() {
            if (!currentLocation) return;

            const { latitude, longitude, accuracy, altitude, speed } = currentLocation;
            
            const locDiv = document.getElementById('location-info');
            locDiv.innerHTML = `
                <div class="location-mono">
                    <strong>📍 Location</strong><br>
                    ${latitude.toFixed(6)}, ${longitude.toFixed(6)}<br>
                    ±${Math.round(accuracy)}m
                </div>
                <div id="nav-quick-stats" class="grid-2" style="margin: 8px 0;">
                    <div class="grid-item">
                        <div class="grid-item-label">Speed</div>
                        <div class="grid-item-value">${speed ? (speed * 3.6).toFixed(1) : '--'} km/h</div>
                    </div>
                    <div class="grid-item">
                        <div class="grid-item-label">Altitude</div>
                        <div class="grid-item-value">${altitude ? Math.round(altitude) : '--'} m</div>
                    </div>
                </div>
            `;

            if (routeTracking) {
                routeHistory.push({
                    lat: latitude,
                    lon: longitude,
                    time: Date.now(),
                    heading: currentHeading
                });
                localStorage.setItem('route-history', JSON.stringify(routeHistory));
                updateRouteStats();
            }

            updateWaypointBearings();
        }

        function updateHeadingDisplay() {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.round(currentHeading / 22.5) % 16;
            document.getElementById('heading-display').textContent = `${currentHeading}° ${directions[index]}`;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function addCurrentLocationAsWaypoint() {
            if (!currentLocation) {
                showNotification('Waiting for GPS...', 'warning');
                return;
            }
            
            const name = document.getElementById('waypoint-name').value.trim();
            if (!name) {
                showNotification('Enter waypoint name', 'error');
                return;
            }

            waypoints.push({
                id: Date.now(),
                name,
                lat: currentLocation.latitude,
                lon: currentLocation.longitude,
                created: new Date().toISOString()
            });

            localStorage.setItem('waypoints', JSON.stringify(waypoints));
            document.getElementById('waypoint-name').value = '';
            renderWaypoints();
            showNotification('Waypoint saved', 'success');
        }

        function addCustomWaypoint() {
            const name = document.getElementById('waypoint-name').value.trim();
            const lat = parseFloat(document.getElementById('waypoint-lat').value);
            const lon = parseFloat(document.getElementById('waypoint-lon').value);

            if (!name || isNaN(lat) || isNaN(lon)) {
                showNotification('Invalid input', 'error');
                return;
            }

            waypoints.push({
                id: Date.now(),
                name,
                lat,
                lon,
                created: new Date().toISOString()
            });

            localStorage.setItem('waypoints', JSON.stringify(waypoints));
            document.getElementById('waypoint-name').value = '';
            document.getElementById('waypoint-lat').value = '';
            document.getElementById('waypoint-lon').value = '';
            renderWaypoints();
            showNotification('Waypoint added', 'success');
        }

        function updateWaypointBearings() {
            if (!currentLocation) return;
            renderWaypoints();
        }

        function renderWaypoints() {
            const list = document.getElementById('waypoints-list');
            
            if (waypoints.length === 0) {
                list.innerHTML = '<li class="text-center text-muted" style="padding: 12px;">No waypoints</li>';
                return;
            }

            list.innerHTML = '';
            waypoints.forEach(wp => {
                let distance = '--';
                let bearing = '--';
                let dirText = '';

                if (currentLocation) {
                    distance = calculateDistance(currentLocation.latitude, currentLocation.longitude, wp.lat, wp.lon).toFixed(1);
                    bearing = Math.round(calculateBearing(currentLocation.latitude, currentLocation.longitude, wp.lat, wp.lon));
                    const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
                    dirText = directions[Math.round(bearing / 22.5) % 16];
                }

                const li = document.createElement('li');
                li.className = 'list-item';
                li.innerHTML = `
                    <div class="list-item-content">
                        <div style="font-weight: bold;">📍 ${wp.name}</div>
                        <div class="text-sm text-muted">📏 ${distance}km | 🧭 ${bearing}° ${dirText}</div>
                    </div>
                    <div class="list-item-actions">
                        <button class="action-btn" onclick="deleteWaypoint(${wp.id})">✕</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function deleteWaypoint(id) {
            waypoints = waypoints.filter(wp => wp.id !== id);
            localStorage.setItem('waypoints', JSON.stringify(waypoints));
            renderWaypoints();
        }

        function toggleRouteTracking() {
            routeTracking = !routeTracking;
            const btn = document.getElementById('tracking-btn');
            if (routeTracking) {
                btn.textContent = '🟢 Stop Tracking';
                btn.style.background = '#1a3a1a';
                routeHistory = [];
            } else {
                btn.textContent = '🔴 Start Tracking';
                btn.style.background = '#111';
            }
            updateRouteStats();
        }

        function updateRouteStats() {
            const statsDiv = document.getElementById('route-stats');
            if (!routeTracking || routeHistory.length < 2) {
                statsDiv.innerHTML = '';
                return;
            }

            const first = routeHistory[0];
            const last = routeHistory[routeHistory.length - 1];
            const distance = calculateDistance(first.lat, first.lon, last.lat, last.lon).toFixed(1);
            const duration = Math.round((last.time - first.time) / 1000 / 60);
            const speed = duration > 0 ? ((distance / duration) * 60).toFixed(1) : '0';

            statsDiv.textContent = `📊 ${distance}km | ${duration}min | ${speed}km/h | ${routeHistory.length} points`;
        }

        function clearRouteHistory() {
            if (confirm('Clear route history?')) {
                routeHistory = [];
                localStorage.setItem('route-history', JSON.stringify(routeHistory));
                updateRouteStats();
                showNotification('History cleared', 'success');
            }
        }

        // ========== TODO SYSTEM ==========
        let todos = JSON.parse(localStorage.getItem('todos') || '[]');
        let currentFilter = 'all';
        let editingId = null;

        todos = todos.map(t => {
            if (typeof t === 'string') {
                return {
                    id: Date.now() + Math.random(),
                    title: t,
                    description: '',
                    priority: 'medium',
                    category: '',
                    dueDate: '',
                    completed: false,
                    created: new Date().toISOString()
                };
            }
            return t;
        });

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function addTodo() {
            const title = document.getElementById('todo-input').value.trim();
            const desc = document.getElementById('todo-desc').value.trim();
            const priority = document.getElementById('todo-priority').value;
            const category = document.getElementById('todo-category').value;
            const dueDate = document.getElementById('todo-date').value;

            if (!title) {
                showNotification('Enter task title', 'error');
                return;
            }

            todos.push({
                id: Date.now() + Math.random(),
                title,
                description: desc,
                priority,
                category,
                dueDate,
                completed: false,
                created: new Date().toISOString()
            });

            saveTodos();
            document.getElementById('todo-input').value = '';
            document.getElementById('todo-desc').value = '';
            document.getElementById('todo-date').value = '';
            document.getElementById('todo-priority').value = 'medium';
            document.getElementById('todo-category').value = '';
            filterTodos();
            showNotification('Task added', 'success');
        }

        function toggleComplete(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                filterTodos();
            }
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            filterTodos();
        }

        function openEditModal(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            editingId = id;
            document.getElementById('edit-input').value = todo.title;
            document.getElementById('edit-desc').value = todo.description;
            document.getElementById('edit-priority').value = todo.priority;
            document.getElementById('edit-category').value = todo.category;
            document.getElementById('edit-date').value = todo.dueDate;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingId = null;
        }

        function saveEdit() {
            if (editingId === null) return;

            const todo = todos.find(t => t.id === editingId);
            if (todo) {
                todo.title = document.getElementById('edit-input').value.trim();
                todo.description = document.getElementById('edit-desc').value.trim();
                todo.priority = document.getElementById('edit-priority').value;
                todo.category = document.getElementById('edit-category').value;
                todo.dueDate = document.getElementById('edit-date').value;
                saveTodos();
                filterTodos();
                showNotification('Task updated', 'success');
            }
            closeEditModal();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterTodos();
        }

        function filterTodos() {
            const list = document.getElementById('todo-list');
            const search = document.getElementById('search-input').value.toLowerCase();

            const filtered = todos.filter(todo => {
                if (currentFilter === 'active' && todo.completed) return false;
                if (currentFilter === 'completed' && !todo.completed) return false;
                if (currentFilter === 'high' && todo.priority !== 'high') return false;

                return todo.title.toLowerCase().includes(search) ||
                       todo.description.toLowerCase().includes(search) ||
                       todo.category.toLowerCase().includes(search);
            });

            filtered.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                const priorityOrder = { high: 0, medium: 1, low: 2 };
                return priorityOrder[a.priority] - priorityOrder[b.priority];
            });

            list.innerHTML = '';
            
            if (filtered.length === 0) {
                list.innerHTML = '<li class="text-center text-muted" style="padding: 12px;">No tasks</li>';
                return;
            }

            filtered.forEach(todo => {
                const li = document.createElement('li');
                li.className = `list-item ${todo.priority} ${todo.completed ? 'completed' : ''}`;

                let dueText = '';
                if (todo.dueDate) {
                    const dueDate = new Date(todo.dueDate);
                    const today = new Date();
                    const diffDays = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
                    dueText = `📅 ${todo.dueDate}`;
                    if (diffDays < 0) dueText += ' (LATE)';
                }

                const catText = todo.category ? `[${todo.category.toUpperCase()}]` : '';

                li.innerHTML = `
                    <div class="list-item-content">
                        <div>${todo.title}</div>
                        ${todo.description ? `<div class="text-sm text-muted">📝 ${todo.description}</div>` : ''}
                        <div class="text-sm text-muted">${catText} ${dueText}</div>
                    </div>
                    <div class="list-item-actions">
                        <button class="action-btn" onclick="toggleComplete(${todo.id})">${todo.completed ? '↩' : '✓'}</button>
                        <button class="action-btn" onclick="openEditModal(${todo.id})">✎</button>
                        <button class="action-btn" onclick="deleteTodo(${todo.id})">✕</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        filterTodos();
    </script>
</body>
</html>
